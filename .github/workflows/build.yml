name: Build APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-go@v5
        with:
          go-version-file: third_party/croc-src/go.mod

      - name: Vendor Go dependencies
        run: cd third_party/croc-src && go mod vendor

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: gradle assembleRelease

      - name: Generate test signing key
        run: |
          keytool -genkeypair \
            -v \
            -keystore test-release.jks \
            -alias test \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Test, OU=Test, O=Test, L=Test, ST=Test, C=US"

      - name: Sign APK
        run: |
          UNSIGNED=$(find app/build/outputs/apk/release -name '*-unsigned.apk' -o -name '*release*.apk' | head -1)
          cp "$UNSIGNED" app/build/outputs/apk/release/croc-app-release.apk
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner sign \
            --ks test-release.jks \
            --ks-pass pass:android \
            --ks-key-alias test \
            --key-pass pass:android \
            --out app/build/outputs/apk/release/croc-app-signed.apk \
            app/build/outputs/apk/release/croc-app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: croc-app-release
          path: app/build/outputs/apk/release/croc-app-signed.apk
